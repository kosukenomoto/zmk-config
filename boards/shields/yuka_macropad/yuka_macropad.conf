# This file was generated from a template. Edit it to match your keyboard.
# See https://zmk.dev/docs/development/hardware-integration/new-shield for more
# instructions.

# This file will be copied into the user's config directory when they add this
# keyboard. Define any Kconfig options users may frequently want to set here,
# but leave them commented out, for example:

# Uncomment to enable the encoder
# CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Uncomment to enable the display
# CONFIG_ZMK_DISPLAY=y
# キーボード名の設定
CONFIG_ZMK_KEYBOARD_NAME="Yuka Macropad"

# 電池・電源関連
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_BATTERY_REPORTING_FETCH_MODE_STATE_OF_CHARGE=y

# 省電力
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_PM_SOFT_OFF=y

# ロータリーエンコーダー
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# 設定保存の安定化
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=10000
##CONFIG_ZMK_USB=y
##CONFIG_USB_DEVICE_STACK=y
#CONFIG_ZMK_USB_LOGGING=y

CONFIG_BT_DEVICE_NAME="YukaPad"

CONFIG_ZMK_BLE=y
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Ni-MH（単4電池）用の設定を有効化
CONFIG_ZMK_NON_LIPO_BATTERY_MANAGEMENT=y

# 電圧設定（mV単位）
# Ni-MH 1セルの場合: 満充電 約1350mV / 空 約1100mV 程度が目安
CONFIG_ZMK_NON_LIPO_MAX_MV=1350
CONFIG_ZMK_NON_LIPO_MIN_MV=1100

# バッテリー低下でシャットダウンさせる閾値（任意）
CONFIG_ZMK_NON_LIPO_LOW_MV=1050
# 60秒（スリープ）
CONFIG_ZMK_NON_LIPO_ADV_SLEEP_TIMEOUT=60000

